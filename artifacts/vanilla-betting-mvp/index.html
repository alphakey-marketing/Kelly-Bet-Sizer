<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kelly Bet Sizer</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: { extend: { colors: { brand: '#6366f1' } } }
      }
    </script>
  </head>
  <body class="h-full text-gray-100 font-sans antialiased">
    <div class="min-h-full flex flex-col items-center justify-start py-12 px-4">

      <!-- ── Header + Live Bankroll ─────────────────────────────────── -->
      <header class="mb-8 text-center w-full max-w-md">
        <h1 class="text-3xl font-bold tracking-tight text-indigo-400">Kelly Bet Sizer</h1>
        <p class="mt-1 text-sm text-gray-400">Half-Kelly position sizing · Phase 2a</p>
        <div class="mt-5 rounded-2xl bg-gray-900 border border-gray-700 px-6 py-4 flex items-center justify-between">
          <div class="text-left">
            <p class="text-xs uppercase tracking-widest text-gray-500 font-semibold">Current Bankroll</p>
            <p id="bankrollDisplay" class="text-2xl font-extrabold text-green-400 mt-0.5">HKD 10,000.00</p>
          </div>
          <div class="flex items-center gap-2">
            <input id="resetBankrollInput" type="number" min="1" step="1"
              placeholder="New amount"
              class="w-28 rounded-lg bg-gray-800 border border-gray-700 px-2 py-1.5
                     text-xs text-white placeholder-gray-500
                     focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
            <button id="resetBankrollBtn"
              class="rounded-lg bg-gray-700 hover:bg-gray-600 transition-colors
                     px-3 py-1.5 text-xs font-semibold text-gray-200">
              Reset
            </button>
          </div>
        </div>
      </header>

      <!-- ── Stats Panel ────────────────────────────────────────────── -->
      <section class="w-full max-w-md mb-8">
        <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-3">Performance</h2>
        <div class="grid grid-cols-3 gap-2 mb-4">
          <div class="rounded-xl bg-gray-900 border border-gray-800 p-3 text-center">
            <p class="text-xs text-gray-500">Win Rate</p>
            <p id="statWinRate" class="text-base font-bold text-white mt-0.5">—</p>
          </div>
          <div class="rounded-xl bg-gray-900 border border-gray-800 p-3 text-center">
            <p class="text-xs text-gray-500">Total P&amp;L</p>
            <p id="statPnl" class="text-base font-bold text-white mt-0.5">—</p>
          </div>
          <div class="rounded-xl bg-gray-900 border border-gray-800 p-3 text-center">
            <p class="text-xs text-gray-500">ROI</p>
            <p id="statRoi" class="text-base font-bold text-white mt-0.5">—</p>
          </div>
          <div class="rounded-xl bg-gray-900 border border-gray-800 p-3 text-center">
            <p class="text-xs text-gray-500">Avg Edge</p>
            <p id="statAvgEdge" class="text-base font-bold text-white mt-0.5">—</p>
          </div>
          <div class="rounded-xl bg-gray-900 border border-gray-800 p-3 text-center">
            <p class="text-xs text-gray-500">Max Drawdown</p>
            <p id="statDrawdown" class="text-base font-bold text-white mt-0.5">—</p>
          </div>
          <div class="rounded-xl bg-gray-900 border border-gray-800 p-3 text-center">
            <p class="text-xs text-gray-500">Streak</p>
            <p id="statStreak" class="text-base font-bold text-white mt-0.5">—</p>
          </div>
        </div>
        <!-- Bankroll Chart -->
        <div class="rounded-xl bg-gray-900 border border-gray-800 p-4">
          <p class="text-xs text-gray-500 uppercase tracking-wider mb-3">Bankroll Over Time</p>
          <div id="bankrollChart"></div>
        </div>
      </section>

      <!-- ── Calculator Card ────────────────────────────────────────── -->
      <section class="w-full max-w-md bg-gray-900 rounded-2xl shadow-xl p-6 space-y-5">
        <div>
          <label for="bankroll" class="block text-sm font-medium text-gray-300 mb-1">
            Bankroll for this Bet (HKD)
          </label>
          <input id="bankroll" type="number" min="0" step="0.01" placeholder="e.g. 10000"
            class="w-full rounded-lg bg-gray-800 border border-gray-700 px-3 py-2
                   text-sm text-white placeholder-gray-500
                   focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
        </div>
        <div>
          <label for="winProb" class="block text-sm font-medium text-gray-300 mb-1">
            Win Probability (%)
            <span class="text-gray-500 font-normal">— e.g. enter 60 for 60%</span>
          </label>
          <input id="winProb" type="number" min="1" max="99" step="1" placeholder="e.g. 60"
            class="w-full rounded-lg bg-gray-800 border border-gray-700 px-3 py-2
                   text-sm text-white placeholder-gray-500
                   focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
        </div>
        <div>
          <label for="odds" class="block text-sm font-medium text-gray-300 mb-1">
            Decimal Odds
            <span class="text-gray-500 font-normal">— e.g. 2.0 = even money</span>
          </label>
          <input id="odds" type="number" min="1.01" step="0.01" placeholder="e.g. 1.85"
            class="w-full rounded-lg bg-gray-800 border border-gray-700 px-3 py-2
                   text-sm text-white placeholder-gray-500
                   focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
        </div>
        <div>
          <label for="betName" class="block text-sm font-medium text-gray-300 mb-1">
            Bet Label <span class="text-gray-500">(optional)</span>
          </label>
          <input id="betName" type="text" maxlength="60" placeholder="e.g. Arsenal vs Chelsea"
            class="w-full rounded-lg bg-gray-800 border border-gray-700 px-3 py-2
                   text-sm text-white placeholder-gray-500
                   focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
        </div>
        <p id="errorMsg" class="hidden text-sm text-red-400"></p>
        <div id="result" class="hidden rounded-xl bg-indigo-950 border border-indigo-700 p-4 space-y-1">
          <p class="text-xs uppercase tracking-widest text-indigo-400 font-semibold">Recommended Bet</p>
          <p id="resultAmount" class="text-2xl font-bold text-white"></p>
          <p id="resultFraction" class="text-xs text-indigo-300"></p>
          <p id="resultEdge" class="text-xs font-semibold"></p>
        </div>
        <div class="flex gap-3">
          <button id="calcBtn"
            class="flex-1 rounded-lg bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700
                   transition-colors py-2 text-sm font-semibold text-white">
            Calculate
          </button>
          <button id="saveBtn"
            class="flex-1 rounded-lg bg-gray-700 hover:bg-gray-600 active:bg-gray-800
                   transition-colors py-2 text-sm font-semibold text-gray-200">
            Save Bet
          </button>
        </div>
      </section>

      <!-- ── Bet History ─────────────────────────────────────────────── -->
      <section class="w-full max-w-md mt-8">
        <div class="flex items-center justify-between mb-2">
          <div>
            <h2 class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Bet History</h2>
            <p class="text-xs text-gray-600 mt-0.5">Click 💚 Win or ❤️ Lose to resolve</p>
          </div>
          <div class="flex items-center gap-2">
            <button id="exportBtn"
              class="text-xs bg-gray-800 hover:bg-gray-700 text-gray-300
                     px-3 py-1.5 rounded-lg transition-colors">
              ⬇ Export CSV
            </button>
            <button id="clearBtn" class="text-xs text-red-500 hover:text-red-400 transition-colors">
              Clear all
            </button>
          </div>
        </div>
        <!-- Filter buttons -->
        <div class="flex gap-2 mb-3">
          <button data-filter="all"    class="filter-btn text-xs px-3 py-1 rounded-full bg-indigo-600 text-white">All</button>
          <button data-filter="active" class="filter-btn text-xs px-3 py-1 rounded-full bg-gray-800 text-gray-400 hover:bg-gray-700">Active</button>
          <button data-filter="won"    class="filter-btn text-xs px-3 py-1 rounded-full bg-gray-800 text-gray-400 hover:bg-gray-700">Won</button>
          <button data-filter="lost"   class="filter-btn text-xs px-3 py-1 rounded-full bg-gray-800 text-gray-400 hover:bg-gray-700">Lost</button>
        </div>
        <ul id="historyList" class="space-y-2"></ul>
        <p id="emptyMsg" class="text-center text-xs text-gray-600 py-4">No saved bets yet.</p>
      </section>

    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
