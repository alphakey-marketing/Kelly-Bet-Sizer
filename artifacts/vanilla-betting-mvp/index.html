<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kelly Bet Sizer</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: '#6366f1'
            }
          }
        }
      }
    </script>
  </head>
  <body class="h-full text-gray-100 font-sans antialiased">

    <div class="min-h-full flex flex-col items-center justify-start py-12 px-4">

      <!-- Header -->
      <header class="mb-10 text-center">
        <h1 class="text-3xl font-bold tracking-tight text-indigo-400">Kelly Bet Sizer</h1>
        <p class="mt-1 text-sm text-gray-400">Half-Kelly position sizing calculator</p>
      </header>

      <!-- Calculator Card -->
      <section class="w-full max-w-md bg-gray-900 rounded-2xl shadow-xl p-6 space-y-5">

        <!-- Bankroll -->
        <div>
          <label for="bankroll" class="block text-sm font-medium text-gray-300 mb-1">
            Bankroll ($)
          </label>
          <input
            id="bankroll"
            type="number"
            min="0"
            step="0.01"
            placeholder="e.g. 1000"
            class="w-full rounded-lg bg-gray-800 border border-gray-700 px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500"
          />
        </div>

        <!-- Win Probability -->
        <div>
          <label for="winProb" class="block text-sm font-medium text-gray-300 mb-1">
            Win Probability (0 – 1)
          </label>
          <input
            id="winProb"
            type="number"
            min="0"
            max="1"
            step="0.01"
            placeholder="e.g. 0.55"
            class="w-full rounded-lg bg-gray-800 border border-gray-700 px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500"
          />
        </div>

        <!-- Decimal Odds -->
        <div>
          <label for="odds" class="block text-sm font-medium text-gray-300 mb-1">
            Decimal Odds (e.g. 2.0 = even money)
          </label>
          <input
            id="odds"
            type="number"
            min="1"
            step="0.01"
            placeholder="e.g. 2.0"
            class="w-full rounded-lg bg-gray-800 border border-gray-700 px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500"
          />
        </div>

        <!-- Bet Label -->
        <div>
          <label for="betName" class="block text-sm font-medium text-gray-300 mb-1">
            Bet Label <span class="text-gray-500">(optional)</span>
          </label>
          <input
            id="betName"
            type="text"
            maxlength="60"
            placeholder="e.g. Team A vs Team B"
            class="w-full rounded-lg bg-gray-800 border border-gray-700 px-3 py-2 text-sm text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500"
          />
        </div>

        <!-- Error -->
        <p id="errorMsg" class="hidden text-sm text-red-400"></p>

        <!-- Result -->
        <div id="result" class="hidden rounded-xl bg-indigo-950 border border-indigo-700 p-4 space-y-1">
          <p class="text-xs uppercase tracking-widest text-indigo-400 font-semibold">Recommended Bet</p>
          <p id="resultAmount" class="text-2xl font-bold text-white"></p>
          <p id="resultFraction" class="text-xs text-indigo-300"></p>
        </div>

        <!-- Buttons -->
        <div class="flex gap-3">
          <button
            id="calcBtn"
            class="flex-1 rounded-lg bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700 transition-colors py-2 text-sm font-semibold text-white"
          >
            Calculate
          </button>
          <button
            id="saveBtn"
            class="flex-1 rounded-lg bg-gray-700 hover:bg-gray-600 active:bg-gray-800 transition-colors py-2 text-sm font-semibold text-gray-200"
          >
            Save Bet
          </button>
        </div>

      </section>

      <!-- History -->
      <section class="w-full max-w-md mt-8">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider">Saved Bets</h2>
          <button id="clearBtn" class="text-xs text-red-500 hover:text-red-400 transition-colors">Clear all</button>
        </div>
        <ul id="historyList" class="space-y-2"></ul>
        <p id="emptyMsg" class="text-center text-xs text-gray-600 py-4">No saved bets yet.</p>
      </section>

    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
